<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Claude Open for Windows</title>
  <desc id="desc">An isolated Windows desktop connected safely to a user supplied compatible gateway.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081225"/><stop offset="0.52" stop-color="#172554"/><stop offset="1" stop-color="#3b176d"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#5eead4"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="430" rx="28" fill="url(#bg)"/>
  <circle cx="1030" cy="70" r="150" fill="#7c3aed" opacity=".22" filter="url(#glow)"/>
  <circle cx="140" cy="390" r="170" fill="#0d9488" opacity=".18" filter="url(#glow)"/>
  <g transform="translate(72 70)">
    <rect width="94" height="94" rx="24" fill="url(#accent)"/>
    <path d="M28 31h38v9H37v14h26v9H37v14h29v9H28z" fill="#081225"/>
    <text x="0" y="152" fill="#f8fafc" font-family="Segoe UI,Arial,sans-serif" font-size="54" font-weight="700">Claude Open</text>
    <text x="0" y="198" fill="#cbd5e1" font-family="Segoe UI,Arial,sans-serif" font-size="25">A separate Windows app for your compatible AI gateway.</text>
    <g transform="translate(0 244)" font-family="Segoe UI,Arial,sans-serif" font-size="18">
      <rect width="192" height="43" rx="21.5" fill="#0f766e"/><text x="24" y="28" fill="#ecfeff">Isolated profile</text>
      <rect x="207" width="207" height="43" rx="21.5" fill="#4338ca"/><text x="231" y="28" fill="#eef2ff">Live model discovery</text>
      <rect x="429" width="187" height="43" rx="21.5" fill="#6d28d9"/><text x="453" y="28" fill="#f5f3ff">Cowork + SSH</text>
    </g>
  </g>
  <g transform="translate(800 105)">
    <rect width="320" height="230" rx="20" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
    <rect width="320" height="43" rx="20" fill="#1e293b"/><rect y="25" width="320" height="18" fill="#1e293b"/>
    <circle cx="24" cy="22" r="6" fill="#fb7185"/><circle cx="44" cy="22" r="6" fill="#fbbf24"/><circle cx="64" cy="22" r="6" fill="#34d399"/>
    <text x="28" y="86" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="14">GATEWAY</text>
    <rect x="28" y="101" width="264" height="38" rx="8" fill="#1e293b"/><text x="43" y="126" fill="#cbd5e1" font-family="Consolas,monospace" font-size="14">https://gateway.example.com</text>
    <text x="28" y="171" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="14">MODEL</text>
    <rect x="28" y="185" width="173" height="30" rx="15" fill="#312e81"/><text x="45" y="205" fill="#e0e7ff" font-family="Segoe UI,Arial,sans-serif" font-size="13">Live discovered model</text>
    <circle cx="271" cy="200" r="15" fill="#0f766e"/><path d="m264 200 5 5 9-11" fill="none" stroke="#ecfeff" stroke-width="3"/>
  </g>
</svg>
